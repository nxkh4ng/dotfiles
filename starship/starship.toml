scan_timeout = 10
command_timeout = 500
add_newline = true
follow_symlinks = false

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[git_branch]
symbol = "’Éś "

[git_status]
ignore_submodules = true
format = '([\[$staged$modified$untracked$conflicted\]]($style) )'

[cmd_duration]
min_time = 2000
